services:
  - type: web
    name: leadgen-api
    plan: free
    runtime: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: leadgen-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: leadgen-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "https://your-vercel-domain.vercel.app,http://localhost:5173"

  - type: keyvalue
    name: leadgen-redis
    plan: free
    ipAllowList: []

databases:
  - name: leadgen-db
    plan: free
    databaseName: leadgen
    user: leadgen
